name: aethespeech
description: AI-powered speech assessment platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  # State management
  provider: ^6.1.2
  # Local storage
  shared_preferences: ^2.3.2
  # Audio recording
  record: ^6.1.2
  # Routing
  go_router: ^14.2.7
  # Loading indicators
  flutter_spinkit: ^5.2.1
  # UUID
  uuid: ^4.4.2
  # Temp directory for audio files
  path_provider: ^2.1.4
  # Audio playback
  just_audio: ^0.9.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
